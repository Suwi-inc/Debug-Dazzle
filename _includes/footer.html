<footer class="site-footer">
  <div class="container footer-grid">
    <div>
      <a class="brand footer-brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark" aria-hidden="true">&lt;/&gt;</span>
        <span class="brand-text">{{ site.title }}</span>
      </a>
      <p>{{ site.tagline }}</p>
    </div>
    <div class="footer-links" aria-label="Footer navigation">
      <a href="{{ '/categories/' | relative_url }}">Categories</a>
      <a href="{{ '/archive/' | relative_url }}">Archive</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </div>
  </div>
  <div class="container footer-bottom">
    <span>© {{ 'now' | date: '%Y' }} {{ site.author.name | default: site.title }}.</span>
    <span>Built for GitHub Pages.</span>
  </div>
</footer>
